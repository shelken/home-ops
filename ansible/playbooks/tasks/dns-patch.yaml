---
- name: 发现 Netplan 生成的 systemd-networkd 配置
  ansible.builtin.find:
    paths: /run/systemd/network
    patterns: "*netplan*.network"
  register: netplan_networks

- name: 创建 systemd-networkd drop-in 目录
  ansible.builtin.file:
    path: "/etc/systemd/network/{{ item.path | basename }}.d"
    state: directory
    mode: "0755"
  loop: "{{ netplan_networks.files }}"
  loop_control:
    label: "{{ item.path | basename }}"

- name: 只让默认 IPv4 路由网卡参与 DNS
  ansible.builtin.copy:
    dest: "/etc/systemd/network/{{ item.path | basename }}.d/override-block-upstream-dns.conf"
    mode: "0644"
    content: |
      # Ansible Managed: DNS policy
      # 默认 IPv4 路由网卡接收 DHCP DNS；其他网卡不参与 DNS；全部网卡拒绝 IPv6 DNS。

      {% set primary_network_file = '10-netplan-' ~ ansible_facts.default_ipv4.interface ~ '.network' %}
      {% set use_dns = (item.path | basename) == primary_network_file %}
      [Network]
      DNSDefaultRoute={{ 'true' if use_dns else 'false' }}

      [IPv6AcceptRA]
      UseDNS=false
      UseDomains=false

      [DHCPv4]
      UseDNS={{ 'true' if use_dns else 'false' }}

      [DHCPv6]
      UseDNS=false
  loop: "{{ netplan_networks.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  notify: Reload systemd-networkd
