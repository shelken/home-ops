---
- name: 配置 UFW 规则
  hosts: vps-cc
  become: true
  gather_facts: false
  tasks:
    - name: 安装 UFW
      ansible.builtin.apt:
        name: ufw
        state: present
        update_cache: true
        cache_valid_time: 3600
      when: (ufw_allowed_rules | default([])) | length > 0

    - name: 读取当前 UFW allow 端口规则
      ansible.builtin.command: ufw show added
      changed_when: false
      check_mode: false
      register: ufw_added_rules
      when: (ufw_allowed_rules | default([])) | length > 0

    - name: 计算需要删除的 UFW allow 端口规则
      ansible.builtin.set_fact:
        ufw_removed_rules: >-
          {{
            ufw_added_rules.stdout_lines
            | select('match', '^ufw allow [0-9]+(/(tcp|udp))?$')
            | map('regex_replace', '^ufw allow ', '')
            | list
            | difference(ufw_allowed_rules | default([]) | map('string') | list)
          }}
      when: (ufw_allowed_rules | default([])) | length > 0

    - name: 删除未声明的 UFW allow 端口规则
      community.general.ufw:
        rule: allow
        port: "{{ (item | string).split('/')[0] }}"
        proto: "{{ (item | string).split('/')[1] if '/' in (item | string) else 'any' }}"
        delete: true
      loop: "{{ ufw_removed_rules | default([]) }}"
      when: (ufw_removed_rules | default([])) | length > 0

    - name: 计算需要添加的 UFW allow 端口规则
      ansible.builtin.set_fact:
        ufw_missing_rules: >-
          {{
            ufw_allowed_rules
            | default([])
            | map('string')
            | list
            | difference(
              ufw_added_rules.stdout_lines
              | select('match', '^ufw allow [0-9]+(/(tcp|udp))?$')
              | map('regex_replace', '^ufw allow ', '')
              | list
            )
          }}
      when: (ufw_allowed_rules | default([])) | length > 0

    - name: 允许端口规则
      community.general.ufw:
        rule: allow
        port: "{{ (item | string).split('/')[0] }}"
        proto: "{{ (item | string).split('/')[1] if '/' in (item | string) else 'any' }}"
      loop: "{{ ufw_missing_rules | default([]) }}"
      when: (ufw_missing_rules | default([])) | length > 0

    - name: 配置 TCP MSS clamp
      ansible.builtin.blockinfile:
        path: /etc/ufw/before.rules
        insertbefore: BOF
        marker: "# {mark} ANSIBLE MANAGED TCP MSS CLAMP"
        block: |
          *mangle
          :POSTROUTING ACCEPT [0:0]
          -A POSTROUTING -o {{ ufw_tcp_mss_clamp.interface }} -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --set-mss {{ ufw_tcp_mss_clamp.mss }}
          COMMIT
      register: ufw_tcp_mss_clamp_rules
      when:
        - ufw_tcp_mss_clamp.enabled | default(false)
        - ufw_tcp_mss_clamp.interface is defined
        - ufw_tcp_mss_clamp.mss is defined

    - name: 移除 TCP MSS clamp（改由接口 MTU 自洽）
      ansible.builtin.blockinfile:
        path: /etc/ufw/before.rules
        marker: "# {mark} ANSIBLE MANAGED TCP MSS CLAMP"
        state: absent
      register: ufw_tcp_mss_clamp_removed
      when: not (ufw_tcp_mss_clamp.enabled | default(false))

    - name: 重载 UFW 使 mangle 变更生效
      ansible.builtin.command: ufw reload
      changed_when: true
      when: >-
        (ufw_tcp_mss_clamp_rules.changed | default(false))
        or (ufw_tcp_mss_clamp_removed.changed | default(false))

    # reload 后 mangle 里可能仍留着旧 TCPMSS，再清一次 live
    - name: 清除 live TCPMSS 规则
      ansible.builtin.shell: |
        changed=0
        while iptables -t mangle -S POSTROUTING | grep -q 'TCPMSS --set-mss'; do
          rule=$(iptables -t mangle -S POSTROUTING | grep 'TCPMSS --set-mss' | head -1 | sed 's/^-A /-D /')
          # shellcheck disable=SC2086
          iptables -t mangle $rule
          changed=1
        done
        exit $changed
      register: ufw_tcp_mss_live_clear
      changed_when: ufw_tcp_mss_live_clear.rc == 1
      failed_when: ufw_tcp_mss_live_clear.rc > 1
      when: not (ufw_tcp_mss_clamp.enabled | default(false))

    - name: 持久化接口 MTU（ifupdown）
      ansible.builtin.lineinfile:
        path: /etc/network/interfaces
        insertafter: "^iface {{ interface_mtu.interface }} inet static$"
        regexp: "^\\s*mtu\\s+\\d+"
        line: "\tmtu {{ interface_mtu.mtu }}"
      when: interface_mtu.enabled | default(false)

    - name: 应用接口 MTU
      ansible.builtin.shell: |
        cur=$(cat /sys/class/net/{{ interface_mtu.interface }}/mtu)
        if [ "$cur" != "{{ interface_mtu.mtu }}" ]; then
          ip link set dev {{ interface_mtu.interface }} mtu {{ interface_mtu.mtu }}
          echo changed
        fi
      register: interface_mtu_apply
      changed_when: "'changed' in interface_mtu_apply.stdout"
      when: interface_mtu.enabled | default(false)

    - name: 启用 UFW
      community.general.ufw:
        state: enabled
      when: (ufw_allowed_rules | default([])) | length > 0
