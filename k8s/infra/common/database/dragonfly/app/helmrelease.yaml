---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dragonfly-operator
  namespace: database
spec:
  interval: 1h
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: dragonfly-operator
  # ref: https://github.com/dragonflydb/dragonfly-operator/blob/main/charts/dragonfly-operator/values.yaml
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # 固定 SA 名，避免迁移后残留旧 ServiceAccount
    serviceAccount:
      name: dragonfly-operator
    # 关闭后 metrics 直连 :8080，Prometheus 无需额外 metrics-reader 绑定
    rbacProxy:
      enabled: false
    manager:
      image:
        repository: ghcr.io/dragonflydb/operator
      resources:
        requests:
          cpu: 10m
          memory: 50Mi
        limits:
          memory: 128Mi
    serviceMonitor:
      enabled: true
      interval: 1m
      timeout: 10s
    grafanaDashboard:
      enabled: true
      folder: Dragonfly
      grafanaOperator:
        enabled: true
        matchLabels:
          grafana.internal/instance: grafana
