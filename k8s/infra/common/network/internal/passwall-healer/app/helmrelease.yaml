---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app passwall-healer
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      passwall-healer:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: busybox
              tag: 1.37.0
            command:
              - /bin/sh
              - -c
              - httpd -f -p 9588 -h /www
            env:
              TZ: ${TIMEZONE}
              ROUTER_HOST: ${ROUTER_IP}
              AUTH_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: openwrt-dns-secret
                    key: AUTH_PASSWORD
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 9588
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 5
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 5m
                memory: 8Mi
              limits:
                memory: 32Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: passwall-healer
        ports:
          http:
            port: *port
    persistence:
      healer-script:
        type: configMap
        name: passwall-healer-configmap
        defaultMode: 0755
        advancedMounts:
          passwall-healer:
            app:
              - path: /www/cgi-bin
                readOnly: true
      healer-tmp:
        type: emptyDir
        advancedMounts:
          passwall-healer:
            app:
              - path: /tmp
