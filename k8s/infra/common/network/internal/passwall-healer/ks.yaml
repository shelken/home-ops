---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app passwall-healer
  namespace: &namespace network
spec:
  dependsOn:
    - name: openwrt-dns
      namespace: network
  interval: 1h
  path: ./k8s/infra/common/network/internal/passwall-healer/app
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
