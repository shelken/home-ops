---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml
  - ./externalsecret.yaml
  - ./prometheusrule.yaml
configMapGenerator:
  - name: zte-mifi-healer-cgi-configmap
    files:
      - reconnect=./resources/reconnect
  - name: zte-mifi-healer-cli-configmap
    files:
      - f50-cli.sh=./resources/f50-cli.sh
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
