---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app zte-mifi-healer
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      zte-mifi-healer:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: curlimages/curl
              tag: 8.19.0@sha256:9a6f6a17667960e077f1b153009aaf18ac99a622221084e1938a45a06fff057a
            command:
              - /bin/sh
              - -c
              - httpd -f -p 9587 -h /www
            env:
              TZ: ${TIMEZONE}
              ZTE_HOST:
                valueFrom:
                  secretKeyRef:
                    name: zte-mifi-healer-secret
                    key: ZTE_HOST
              ZTE_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: zte-mifi-healer-secret
                    key: ZTE_PASSWORD
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 9587
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 5
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 5m
                memory: 8Mi
              limits:
                memory: 32Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      healer-cgi:
        type: configMap
        name: zte-mifi-healer-cgi-configmap
        defaultMode: 0755
        advancedMounts:
          zte-mifi-healer:
            app:
              - path: /www/cgi-bin
                readOnly: true
      healer-cli:
        type: configMap
        name: zte-mifi-healer-cli-configmap
        defaultMode: 0755
        advancedMounts:
          zte-mifi-healer:
            app:
              - path: /opt/zte-mifi-healer
                readOnly: true
      healer-tmp:
        type: emptyDir
        advancedMounts:
          zte-mifi-healer:
            app:
              - path: /tmp
