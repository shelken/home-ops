---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - helmrelease.yaml
  - externalsecret.yaml
configMapGenerator:
  - name: caddy-external-scripts
    files:
      - ip-selector.sh=./resources/ip-selector.sh
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
