---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: ratelimit-external
spec:
  compression:
    - type: Brotli
    - type: Gzip
  connection:
    bufferLimit: 8Mi
  targetSelectors:
    - group: gateway.networking.k8s.io
      kind: Gateway
      matchLabels:
        app.ooooo.space/gateway-type: external
  tcpKeepalive: {}
  timeout:
    http:
      requestTimeout: 0s
  rateLimit:
    type: Local
    local:
      rules:
        # 每个 HTTPRoute 上限 100 req/s，超限返回 429; homepage peak ~= 70
        - limit:
            requests: 100
            unit: Second
