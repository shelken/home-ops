---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/apps/daemonset_v1.json
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: geoip-updater
spec:
  selector:
    matchLabels:
      app: geoip-updater
  template:
    metadata:
      labels:
        app: geoip-updater
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      securityContext:
        runAsUser: 0
      containers:
        - name: updater
          image: curlimages/curl:8.11.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu

              sync_db() {
                for db in GeoLite2-City.mmdb GeoLite2-ASN.mmdb; do
                  url="https://github.com/P3TERX/GeoLite.mmdb/raw/download/$db"
                  target="/geoip/$db"
                  tmp="$target.tmp"
                  etag="$target.etag"
                  etag_tmp="$etag.tmp"

                  echo "Updating $db..."
                  code=$(curl -sSL --connect-timeout 10 --max-time 300 \
                    --etag-compare "$etag" --etag-save "$etag_tmp" \
                    -w "%{http_code}" -o "$tmp" "$url")

                  if [ "$code" = "304" ]; then
                    rm -f "$tmp" "$etag_tmp"
                    echo "$db unchanged."
                    continue
                  fi

                  if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
                    echo "$db download failed: HTTP $code" >&2
                    rm -f "$tmp" "$etag_tmp"
                    exit 1
                  fi

                  test -s "$tmp"
                  mv -f "$tmp" "$target"
                  if [ -s "$etag_tmp" ]; then
                    mv -f "$etag_tmp" "$etag"
                  else
                    rm -f "$etag_tmp"
                  fi
                done

                ls -lh /geoip/
              }

              while true; do
                sync_db
                sleep 604800
              done
          volumeMounts:
            - name: geoip-storage
              mountPath: /geoip
      volumes:
        - name: geoip-storage
          hostPath:
            path: /data/envoy-geoip
            type: DirectoryOrCreate
