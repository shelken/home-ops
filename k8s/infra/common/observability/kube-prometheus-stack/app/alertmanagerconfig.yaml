---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/alertmanagerconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmanager
spec:
  route:
    groupBy: ["alertname", "job"]
    groupInterval: 10m
    groupWait: 1m
    receiver: alert
    repeatInterval: 12h
    routes:
      - receiver: "null"
        matchers:
          - name: alertname
            value: InfoInhibitor
            matchType: =
      - receiver: heartbeat
        groupInterval: 5m
        groupWait: 0s
        repeatInterval: 5m
        matchers:
          - name: alertname
            value: Watchdog
            matchType: =
      - receiver: passwall-recover
        groupInterval: 30m
        groupWait: 30s
        repeatInterval: 30m
        matchers:
          - name: autoheal
            value: passwall-restart
            matchType: =
      - receiver: f50-network-recover
        groupInterval: 30m
        groupWait: 30s
        repeatInterval: 30m
        matchers:
          - name: autoheal
            value: f50-network
            matchType: =
      - receiver: alert
        matchers:
          - name: severity
            value: critical
            matchType: =
  inhibitRules:
    - equal: ["alertname", "namespace"]
      sourceMatch:
        - name: severity
          value: critical
          matchType: =
      targetMatch:
        - name: severity
          value: warning
          matchType: =
  receivers:
    - name: "null"
    - name: heartbeat
      webhookConfigs:
        - sendResolved: false
          urlSecret:
            key: HEALTHCHECKS_PING_URL
            name: alertmanager-secret
    - name: passwall-recover
      webhookConfigs:
        - url: "http://passwall-healer.network.svc.cluster.local:9588/cgi-bin/restart-passwall"
          sendResolved: false
        - url: "http://localhost:8060/webhook"
          sendResolved: false
    - name: f50-network-recover
      webhookConfigs:
        - url: "http://zte-mifi-healer.network.svc.cluster.local:9587/cgi-bin/reconnect"
          sendResolved: false
        - url: "http://localhost:8060/webhook"
          sendResolved: false
    - name: &name alert
      webhookConfigs:
        - url: "http://localhost:8060/webhook"
          sendResolved: false
      # slackConfigs:
      #   - sendResolved: false
      #     apiURL:
      #       key: ALERTMANAGER_ALERT_URL
      #       name: alertmanager-secret
      #     username: *name
