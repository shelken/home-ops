# OpenAI compatibility providers
# priority 越大越优先
openai-compatibility:
  - name: "deepseek" # The name of the provider; it will be used in the user agent and other places.
    # prefix: "test" # optional: require calls like "test/kimi-k2" to target this provider's credentials
    priority: 100
    base-url: "https://api.deepseek.com" # The base URL of the provider.
    # headers:
    #   X-Custom-Header: "custom-value"
    api-key-entries:
      - api-key: {{ .DEEPSEEK_API_KEY_1 }}
    models: # The models supported by the provider.
      - name: "deepseek-chat" # The actual model name.
        alias: "deepseek-chat" # The alias used in the API.
      - name: "deepseek-reasoner" # The actual model name.
        alias: "deepseek-reasoner" # The alias used in the API.
  - name: "openrouter"
    priority: 80
    base-url: "https://openrouter.ai/api/v1"
    api-key-entries:
      - api-key: {{ .OPENROUTER_API_KEY_1 }}
      - api-key: {{ .OPENROUTER_API_KEY_2 }}
      - api-key: {{ .OPENROUTER_API_KEY_3 }}
      - api-key: {{ .OPENROUTER_API_KEY_4 }}
      - api-key: {{ .OPENROUTER_API_KEY_5 }}
      - api-key: {{ .OPENROUTER_API_KEY_6 }}
      - api-key: {{ .OPENROUTER_API_KEY_7 }}
      - api-key: {{ .OPENROUTER_API_KEY_8 }}
    models:
      - name: "google/gemma-4-26b-a4b-it:free"
        alias: "google/gemma-4-26b-a4b-it:free"
      - name: "google/gemma-4-31b-it:free"
        alias: "google/gemma-4-31b-it:free"
      - name: "openai/gpt-oss-120b:free"
        alias: "openai/gpt-oss-120b:free"
      - name: "openai/gpt-oss-20b:free"
        alias: "openai/gpt-oss-20b:free"
      - name: "minimax/minimax-m2.5:free"
        alias: "minimax/minimax-m2.5:free"
