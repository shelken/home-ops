---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app cpa-usage-keeper
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      cpa-usage-keeper:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/willxup/cpa-usage-keeper
              tag: v1.5.0@sha256:bcf0c04e5e80778979f98c7b4f65047d59ee781c23403509e4584136ef1f299c
            command: ["/app/cpa-usage-keeper"]
            env:
              TZ: ${TIMEZONE}
              WORK_DIR: /data
              CPA_BASE_URL: http://cli-proxy-api:8317
              REDIS_QUEUE_ADDR: cli-proxy-api:8317
              AUTH_ENABLED: "true"
              USAGE_SYNC_MODE: redis
              APP_BASE_PATH: /usage
            envFrom:
              - secretRef:
                  name: cpa-usage-keeper-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: &port 8080
    persistence:
      data:
        existingClaim: cpa-usage-keeper
        advancedMounts:
          cpa-usage-keeper:
            app:
              - path: /data
