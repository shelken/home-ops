---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

set: [pipefail]
shopt: [globstar]

vars:
  VAULT_NAME: shelken-homelab

tasks:
  azsecret:
    desc: 显示 {{ .VAULT_NAME }} 某个secret的value，如果没有传则显示namelist列表
    silent: true
    cmd: |
      if [ -n "{{ .key }}" ]; then
        az keyvault secret show --vault-name {{ .VAULT_NAME }} --name "{{ .key }}" --query value -otsv
        exit 0
      fi
      az keyvault secret list --vault-name {{ .VAULT_NAME }} --query "[].name"

  set-key:
    desc: 设置 JSON secret [secret] 中的 [key]=[value]（不存在则创建，已存在则更新）
    requires:
      vars: ["secret", "key", "value"]
    cmd: |
      [ -z "{{ .value }}" ] && echo "value 不能为空" && exit 1
      current=$(az keyvault secret show --vault-name {{ .VAULT_NAME }} --name "{{ .secret }}" --query value -otsv 2>/dev/null || echo "{}")
      updated=$(echo "$current" | jq --arg k "{{ .key }}" --arg v "{{ .value }}" '. + {($k): $v}')
      echo "$updated" | az keyvault secret set --vault-name {{ .VAULT_NAME }} --name "{{ .secret }}" --value @- > /dev/null
      $(exit 0)
    silent: true

  keys:
    desc: 查看 JSON secret [secret] 中有哪些 key（不显示值）
    requires:
      vars: ["secret"]
    silent: true
    cmd: |
      az keyvault secret show --vault-name {{ .VAULT_NAME }} --name "{{ .secret }}" --query value -otsv 2>/dev/null | jq 'keys' || { echo "未找到"; exit 1; }

  azure-creds-list:
    desc: 查看 External Secrets Azure App 的所有 credential 元数据（不显示 secret value）
    silent: true
    cmd: |
      client_id=$(az keyvault secret show --vault-name {{ .VAULT_NAME }} --name azure-creds --query value -otsv | jq -r '.ClientID')
      az ad app credential list --id "$client_id" \
        --query '[].{displayName:displayName,keyId:keyId,startDateTime:startDateTime,endDateTime:endDateTime}' \
        -o table

  azure-creds-rotate:
    desc: 轮换 External Secrets Azure App credential，并写回 KeyVault 的 azure-creds（默认 years=1）
    silent: true
    vars:
      years: '{{ .years | default "1" }}'
      display_name:
        sh: echo 'external-secrets-'$(date -u +%Y%m%d)
    cmd: |
      client_id=$(az keyvault secret show --vault-name {{ .VAULT_NAME }} --name azure-creds --query value -otsv | jq -r '.ClientID')
      new_secret=$(az ad app credential reset \
        --id "$client_id" \
        --append \
        --display-name "{{ .display_name }}" \
        --years {{ .years }} \
        --query password \
        -o tsv)
      jq -n --arg id "$client_id" --arg secret "$new_secret" '{ClientID:$id,ClientSecret:$secret}' \
        | az keyvault secret set --vault-name {{ .VAULT_NAME }} --name azure-creds --value @- > /dev/null
      unset new_secret
      echo "✓ azure-creds 已在 KeyVault 中轮换；有效期 {{ .years }} 年"
      echo "下一步：task secret:bootstrap && kubectl -n external-secrets rollout restart deploy/external-secrets"

  edit:
    desc: 用 vim 编辑 KeyVault 中的 JSON secret
    requires:
      vars: ["secret"]
    cmd: |
      tmp=$(mktemp)
      az keyvault secret show --vault-name {{ .VAULT_NAME }} --name "{{ .secret }}" --query value -otsv 2>/dev/null > "$tmp" || echo "{}" > "$tmp"
      chmod 600 "$tmp"
      before=$(sha256sum < "$tmp")
      vim "$tmp"
      after=$(sha256sum < "$tmp")
      if [ "$before" != "$after" ] && [ -s "$tmp" ] && jq . "$tmp" > /dev/null 2>&1; then
        cat "$tmp" | az keyvault secret set --vault-name {{ .VAULT_NAME }} --name "{{ .secret }}" --value @- > /dev/null
        echo "✓ {{ .secret }} 已更新"
      elif [ ! -s "$tmp" ]; then
        echo "✗ 内容已清空，未写入"
      elif ! jq . "$tmp" > /dev/null 2>&1; then
        echo "✗ JSON 格式错误，未写入"
      else
        echo "→ 未检测到变更，跳过"
      fi
      rm -f "$tmp"

  delete-key:
    desc: 删除 JSON secret [secret] 中的某个 [key]
    requires:
      vars: ["secret", "key"]
    prompt: 确定要删除 secret "{{ .secret }}" 中的 key "{{ .key }}" 吗？
    cmd: |
      current=$(az keyvault secret show --vault-name {{ .VAULT_NAME }} --name "{{ .secret }}" --query value -otsv)
      updated=$(echo "$current" | jq 'del(."{{ .key }}")')
      echo "$updated" | az keyvault secret set --vault-name {{ .VAULT_NAME }} --name "{{ .secret }}" --value @- > /dev/null
      $(exit 0)
    silent: true

  delete:
    desc: 删除 {{ .VAULT_NAME }} 中的某个 secret（交互式选择或指定 key=xxx）
    prompt: 确定要删除 secret "{{ .key }}" 吗？此操作不可逆！
    vars:
      key:
        sh: |
          if [ -n "{{ .key }}" ]; then
            echo "{{ .key }}"
          else
            az keyvault secret list --vault-name {{ .VAULT_NAME }} --query "[].name" -otsv | fzf --prompt="选择要删除的 secret: "
          fi
    cmd: |
      [ -z "{{ .key }}" ] && echo "未选择任何 secret" && exit 1
      az keyvault secret delete --vault-name {{ .VAULT_NAME }} --name "{{ .key }}"

  bootstrap:
    desc: 加载 bootstrap/resources.yaml 中的所有信息到集群
    cmd: |
      output=$(bash {{.ROOT_DIR}}/scripts/azure-inject.sh {{.ROOT_DIR}}/bootstrap/resources.yaml)
      echo "$output" | kubectl diff --filename - &>/dev/null \
      || echo "$output" | kubectl apply --server-side --filename -
