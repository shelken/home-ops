#ref: https://github.com/lima-vm/lima/blob/master/templates/default.yaml
# Remote node at 192.168.0.x network, connected via ZeroTier VPN

env:
  http_proxy: ""
  https_proxy: ""
  no_proxy: ""

cpus: 6
memory: 8G
disk: 40G

# No additional disks available on yuuko
# additionalDisks:
#   - "longhorn"

ssh:
  localPort: 60123

hostResolver:
  enabled: false

# https://lima-vm.io/docs/config/network/vmnet/
# Requires socket_vmnet to be installed on the host
# Install: brew install socket_vmnet && sudo brew services start socket_vmnet
networks:
  - lima: bridged
    interface: eth1
    macAddress: "52:55:55:37:34:57"
    metric: 100

portForwards:
  - ignore: true
    proto: any
    guestPort: 443
    guestIP: 0.0.0.0
  - ignore: true
    proto: any
    guestPort: 80
    guestIP: 0.0.0.0

images:
  # 固定版本 + digest，只下载一次，后续复用缓存
  - location: "https://cloud-images.ubuntu.com/releases/noble/release-20260518/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: "x86_64"
    digest: "sha256:53fdde898feed8b027d94baa9cfe8229867f330a1d9c49dc7d84465ee7f229f7"
  - location: "https://cloud-images.ubuntu.com/releases/noble/release-20260518/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"
    digest: "sha256:6a61b967ba4a27dd1966f835a67643073ed55c2860ce3dc1cb0517282e6b8bec"
  # 回退——不带 digest，跟随上游滚动
  - location: "https://cloud-images.ubuntu.com/releases/noble/release/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: "x86_64"
  - location: "https://cloud-images.ubuntu.com/releases/noble/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"

# containerd is managed by k3s, not by Lima
containerd:
  system: false
  user: false

provision:
  - mode: system
    script: |
      #!/bin/bash
      # 网络由 Ansible setup-dns.yaml 统一管理（50-node-network.yaml）。
      # 这里只清理 cloud-init / Lima 历史遗留的 netplan，避免与 Ansible 冲突。
      rm -f /etc/netplan/99-eth1.yaml /etc/netplan/90-eth1.yaml /etc/netplan/50-cloud-init.yaml
      netplan apply || true
      # Lima cidata 20-rootless-base.sh 无条件 loginctl enable-linger，
      # 但本机 k3s 用 root containerd，不需要 rootless user manager 常驻。
      # 关闭 linger 避免 systemd 255 mountinfo churn 堆积内存（见 postmortem 015、issue #1301）。
      loginctl disable-linger shelken 2>/dev/null || true

probes: []
copyToHost: []
